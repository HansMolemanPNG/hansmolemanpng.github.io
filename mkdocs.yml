site_name: Hans_Moleman.PNG
site_url: https://hansmolemanpng.github.io/

theme:
  name: material
  logo: assets/profile.jpeg
  favicon: assets/profile.jpeg
  custom_dir: overrides

  palette:
    - scheme: slate
      primary: black
      accent: green

  features:
   # - navigation.top   # opcional
    #- toc.integrate    # opcional

plugins:
  - search
  - git-revision-date-localized:
      type: iso_date
      enable_creation_date: true
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js

hooks:
  - hooks.py

not_in_nav: |
  blog/**

nav:
  - Blog: index.md
  - About: about.md

site_name: hansmolemanpng
site_description: Security research and vulnerability notes
site_url: https://hansmolemanpng.github.io/

theme:
  name: material
  logo: assets/profile.jpeg
  favicon: assets/profile.jpeg
  palette:
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Blog: index.md
  - About: about.md

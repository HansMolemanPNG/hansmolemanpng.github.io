site_name: Hans_Moleman.PNG
site_url: https://hansmolemanpng.github.io/

theme:
  name: null
  custom_dir: theme

markdown_extensions:
  - attr_list
  - md_in_html
  - sane_lists
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.highlight:
      use_pygments: false
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: false
      toc_depth: 2

hooks:
  - hooks.py

not_in_nav: |
  blog/*/index.md
  kb/**

nav:
  - Home: index.md
  - Blog: blog/index.md
  - Knowledge Base: kb/index.md
  - About: about.md

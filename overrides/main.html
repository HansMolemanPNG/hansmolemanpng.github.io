{% extends "base.html" %}

{% block header %}{% endblock %}
{% block tabs %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-inner">

      <div class="profile">
        <img class="avatar" src="{{ 'assets/profile.jpeg' | url }}" alt="profile">
        <div class="name">Hans_Moleman.PNG</div>
        <div class="bio">AppSec · Web Security · Vulnerability Research</div>
      </div>

      <div class="social-row">
        <a class="iconbtn" href="https://x.com/HansMolemanPNG" target="_blank" rel="noopener" aria-label="X">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.9 2H22l-6.8 7.8L23 22h-6.2l-4.9-6.4L6.3 22H3.2l7.3-8.4L1 2h6.3l4.4 5.8L18.9 2zm-1.1 18h1.7L7.4 3.9H5.6L17.8 20z"/></svg>
        </a>

        <a class="iconbtn" href="https://github.com/HansMolemanPNG" target="_blank" rel="noopener" aria-label="GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 0 0-3.2 19.5c.5.1.7-.2.7-.5v-1.8c-2.9.6-3.5-1.2-3.5-1.2-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.6 1 1.6 1 .9 1.6 2.4 1.1 3 .8.1-.7.4-1.1.7-1.4-2.3-.3-4.7-1.2-4.7-5.2 0-1.1.4-2.1 1-2.8-.1-.2-.4-1.3.1-2.7 0 0 .8-.3 2.8 1a9.7 9.7 0 0 1 5.1 0c2-1.3 2.8-1 2.8-1 .6 1.4.2 2.5.1 2.7.6.7 1 1.7 1 2.8 0 4-2.4 4.9-4.7 5.2.4.3.7 1 .7 2v3c0 .3.2.6.7.5A10 10 0 0 0 12 2z"/></svg>
        </a>

        <a class="iconbtn" href="mailto:alsamapa@gmail.com" aria-label="Email">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5L4 8V6l8 5 8-5v2z"/></svg>
        </a>
      </div>

      <div class="sidebar-divider"></div>

      <div class="navlinks">
        <a class="navbtn{% if page.file.src_path == 'index.md' or 'blog/' in page.file.src_path %} active{% endif %}" href="{{ 'index.html' | url }}">Blog</a>
        <a class="navbtn{% if page.file.src_path == 'about.md' %} active{% endif %}" href="{{ 'about/' | url }}">About</a>
      </div>

    </div>
  </aside>

  <main class="main">
    {{ page.content }}
  </main>

</div>
{% endblock %}

<script>
/* Adapt the viewport to the widest pre block so code/taxonomy lines
   never wrap or scroll. Runs inline (end of body) before first paint.
   Capped at 919px so the 920px breakpoint always fires on mobile
   → accordion TOC, never the sticky sidebar.                          */
(function () {
  /* Skip on desktop — physical screen width 1024px or wider */
  if (window.screen.width >= 1024) return;

  var maxW = 0;
  document.querySelectorAll('.article-content pre').forEach(function (pre) {
    maxW = Math.max(maxW, pre.scrollWidth);
  });
  if (maxW <= 0) return;

  var main = document.querySelector('.main');
  if (!main) return;
  var cs   = getComputedStyle(main);
  /* At the initial (narrow) viewport the 600 px breakpoint is active and
     gives 1rem side padding. Once widened past 600 px the base rule of
     1.5 rem takes over. Use the larger value so the code always fits. */
  var hPad = Math.max(
    parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight),
    48   /* 2 × 1.5rem at 16 px base font = base .main padding */
  );
  var needed = Math.ceil(maxW + hPad);

  /* Only widen if content is actually wider than the current viewport */
  if (needed <= window.innerWidth) return;

  /* Cap at 919px so the 920px media-query breakpoint always fires.
     This guarantees the accordion layout on every mobile device. */
  var setWidth = Math.min(needed, 919);
  var meta = document.querySelector('meta[name=viewport]');
  if (meta) meta.content = 'width=' + setWidth;

  /* Pass the scale ratio to CSS so the navbar can compensate.
     scale = logical viewport / physical screen width
     e.g. 919 / 375 ≈ 2.45  → navbar must be 2.45× larger in CSS px
     so that after browser scaling (375/919) it renders at 52px physical. */
  var scale = setWidth / window.innerWidth;
  document.documentElement.style.setProperty('--vp-scale', scale.toFixed(4));
  /* Adjust scroll-padding-top so headings aren't hidden under the scaled navbar */
  var navH = Math.ceil(52 * scale);
  document.documentElement.style.scrollPaddingTop =
    'calc(' + navH + 'px + ' + (1.25 * scale).toFixed(3) + 'rem)';
}());
</script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        background:           '#161310',
        mainBkg:              '#1d1a16',
        primaryColor:         '#1d1a16',
        primaryBorderColor:   '#f5a742',
        primaryTextColor:     '#dfd4c7',
        lineColor:            '#f5a742',
        edgeLabelBackground:  '#1d1a16',
        secondaryColor:       '#161310',
        tertiaryColor:        '#0f0d0b',
        clusterBkg:           '#161310',
        clusterBorder:        'rgba(245,167,66,0.35)',
        titleColor:           '#dfd4c7',
        fontFamily:           'JetBrains Mono, monospace',
        fontSize:             '13px',
      }
    });
    mermaid.run({ querySelector: '.mermaid' }).then(() => {
      document.querySelectorAll('.mermaid svg').forEach(svg => {
        const w = parseFloat(svg.getAttribute('width'));
        const h = parseFloat(svg.getAttribute('height'));
        if (!svg.getAttribute('viewBox') && w && h) {
          svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        }
        svg.removeAttribute('width');
        svg.removeAttribute('height');

        /* Pan / zoom — loaded dynamically so a CDN failure never blocks mermaid */
        const container = svg.closest('.mermaid');
        if (!container) return;
        import('https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4/dist/panzoom.esm.js')
          .then(({ default: Panzoom }) => {
            const pz = Panzoom(svg, { maxScale: 10, minScale: 0.2 });
            container.addEventListener('wheel', pz.zoomWithWheel, { passive: false });

            const resetBtn = document.createElement('button');
            resetBtn.className = 'mermaid-reset';
            resetBtn.textContent = '⟳ reset';
            resetBtn.title = 'Reset zoom';
            container.appendChild(resetBtn);
            resetBtn.addEventListener('click', () => pz.reset());
          })
          .catch(() => { /* Panzoom unavailable — diagram still displays */ });
      });
    });
  </script>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        background:           '#161310',
        mainBkg:              '#1d1a16',
        primaryColor:         '#1d1a16',
        primaryBorderColor:   '#f5a742',
        primaryTextColor:     '#dfd4c7',
        lineColor:            '#f5a742',
        edgeLabelBackground:  '#1d1a16',
        secondaryColor:       '#161310',
        tertiaryColor:        '#0f0d0b',
        clusterBkg:           '#161310',
        clusterBorder:        'rgba(245,167,66,0.35)',
        titleColor:           '#dfd4c7',
        fontFamily:           'JetBrains Mono, monospace',
        fontSize:             '13px',
      }
    });
    mermaid.run({ querySelector: '.mermaid' }).then(() => {
      document.querySelectorAll('.mermaid svg').forEach(svg => {
        const w = parseFloat(svg.getAttribute('width'));
        const h = parseFloat(svg.getAttribute('height'));
        if (!svg.getAttribute('viewBox') && w && h) {
          svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        }
        svg.removeAttribute('width');
        svg.removeAttribute('height');

        /* Pan / zoom — loaded dynamically so a CDN failure never blocks mermaid */
        const container = svg.closest('.mermaid');
        if (!container) return;
        import('https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4/dist/panzoom.esm.js')
          .then(({ default: Panzoom }) => {
            const pz = Panzoom(svg, { maxScale: 10, minScale: 0.2 });
            container.addEventListener('wheel', pz.zoomWithWheel, { passive: false });

            const resetBtn = document.createElement('button');
            resetBtn.className = 'mermaid-reset';
            resetBtn.textContent = '⟳ reset';
            resetBtn.title = 'Reset zoom';
            container.appendChild(resetBtn);
            resetBtn.addEventListener('click', () => pz.reset());
          })
          .catch(() => { /* Panzoom unavailable — diagram still displays */ });
      });
    });
  </script>
